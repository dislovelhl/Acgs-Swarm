name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        env:
          OPENAI_API_KEY: test-key-for-unit-tests
          ANTHROPIC_API_KEY: test-key-for-unit-tests
        run: |
          python -m pytest tests/ \
            --import-mode=importlib \
            -m "not slow and not benchmark and not e2e and not research and not bittensor" \
            -v --tb=short

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: pip install build twine
      - name: Build
        run: python -m build --wheel --sdist
      - name: Validate
        run: twine check dist/*
      - name: Smoke test wheel install
        run: pip install dist/*.whl && python -c "import constitutional_swarm; print('import OK')"

  publish:
    needs: [test, package]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tools
        run: pip install build twine
      - name: Build
        run: python -m build --wheel --sdist
      - name: Check
        run: twine check dist/*
      - name: Publish
        uses: pypa/gh-action-pypi-publish@v1.12.3
