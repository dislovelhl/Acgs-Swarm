name: TLA+ model check

on:
  push:
    branches: [main]
    paths:
      - 'specs/**'
      - '.github/workflows/tla-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'specs/**'
      - '.github/workflows/tla-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tlc:
    name: TLC model check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        spec:
          - name: mesh
            module: MeshMC
            config: MeshMC.cfg
          - name: constitution_reconfig
            module: constitution_reconfig
            config: constitution_reconfig.cfg
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache tla2tools.jar
        id: cache-tla
        uses: actions/cache@v4
        with:
          path: tla2tools.jar
          key: tla2tools-v1.8.0

      - name: Download tla2tools.jar
        if: steps.cache-tla.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar
          sha256sum tla2tools.jar

      - name: Run TLC on ${{ matrix.spec.name }}
        working-directory: specs
        run: |
          java -XX:+UseParallelGC -Xmx2g \
            -cp ../tla2tools.jar tlc2.TLC \
            -deadlock \
            -workers auto \
            -config ${{ matrix.spec.config }} \
            ${{ matrix.spec.module }} \
            | tee ../tlc-${{ matrix.spec.name }}.log

      - name: Upload TLC log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tlc-${{ matrix.spec.name }}-log
          path: tlc-${{ matrix.spec.name }}.log
          retention-days: 14
