name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
        extras: ["dev"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[${{ matrix.extras }}]"
      - name: Lint
        run: ruff check src/constitutional_swarm/
      - name: Test
        env:
          OPENAI_API_KEY: test-key-for-unit-tests
          ANTHROPIC_API_KEY: test-key-for-unit-tests
        run: |
          python -m pytest tests/ \
            --import-mode=importlib \
            -m "not slow and not benchmark and not e2e and not research" \
            -v --tb=short

  test-research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install with research extras
        run: pip install -e ".[dev,research]"
      - name: Test research stack
        env:
          OPENAI_API_KEY: test-key-for-unit-tests
          ANTHROPIC_API_KEY: test-key-for-unit-tests
        run: |
          python -m pytest tests/ \
            --import-mode=importlib \
            -m "not slow and not benchmark and not e2e" \
            -v --tb=short

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tools
        run: pip install build twine
      - name: Build
        run: python -m build --wheel --sdist
      - name: Validate
        run: twine check dist/*
