name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
        extras: ["dev"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[${{ matrix.extras }},transport]"
      - name: Lint
        run: ruff check src/constitutional_swarm/
      - name: Test
        env:
          OPENAI_API_KEY: test-key-for-unit-tests
          ANTHROPIC_API_KEY: test-key-for-unit-tests
        run: |
          python -m pytest tests/ \
            --import-mode=importlib \
            -m "not slow and not benchmark and not e2e and not research and not bittensor" \
            -v --tb=short

  test-research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install with research extras
        run: pip install -e ".[dev,research,transport]"
      - name: Test research stack
        env:
          OPENAI_API_KEY: test-key-for-unit-tests
          ANTHROPIC_API_KEY: test-key-for-unit-tests
        run: |
          python -m pytest tests/ \
            --import-mode=importlib \
            -m "not slow and not benchmark and not e2e" \
            -v --tb=short

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tools
        run: pip install build twine
      - name: Build
        run: python -m build --wheel --sdist
      - name: Validate
        run: twine check dist/*
      - name: Smoke test wheel install
        run: pip install dist/*.whl && python -c "import constitutional_swarm; print('import OK')"

  test-extras-bittensor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install with bittensor extras
        run: pip install -e ".[dev,bittensor]"
      - name: Verify bittensor extras import
        run: python -c "from constitutional_swarm.bittensor.protocol import MinerConfig; print('bittensor extras OK')"

  test-extras-transport:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install with transport extras
        run: pip install -e ".[dev,transport]"
      - name: Verify transport extras import
        run: python -c "from constitutional_swarm.gossip_protocol import GossipNode; print('transport extras OK')"
