name: Bug report
description: Report a defect in the package, workflows, or docs.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a report. Please include enough detail for us to reproduce the problem quickly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
      placeholder: A concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest sequence of steps that reproduces the issue.
      placeholder: |
        1. Install ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      description: Include the released version or commit SHA you tested.
      placeholder: 0.2.0
    validations:
      required: true

  - type: dropdown
    id: install_path
    attributes:
      label: Install path
      options:
        - pip install constitutional-swarm
        - pip install "constitutional-swarm[transport]"
        - pip install "constitutional-swarm[research]"
        - editable install from source
        - other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, and any relevant runtime details.
      placeholder: Ubuntu 24.04, Python 3.12, local workstation
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and traceback
      description: Paste error output, logs, or screenshots if available.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I can reproduce this against the latest main branch or latest release.
          required: true
